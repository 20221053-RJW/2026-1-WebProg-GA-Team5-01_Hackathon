<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Test Feedback API</title>
  </head>

  <body>
    <h2>Gửi Feedback</h2>

    <input id="content" placeholder="Nội dung" />
    <input id="category" placeholder="Category" />
    <button onclick="send()">Gửi</button>

    <h2>Danh sách feedback</h2>
    <button onclick="loadData()">Load data</button>

    <ul id="list"></ul>

    <script>
      // gửi data lên MongoDB qua API /save
      async function send() {
        const content = document.getElementById("content").value;
        const category = document.getElementById("category").value;

        await fetch("http://localhost:1000/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ content, category }),
        });

        alert("Gửi thành công!");
        loadData();
      }

      // lấy data từ /api/feedbacks
      async function loadData() {
        const res = await fetch("http://localhost:1000/api/feedbacks");
        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach((item) => {
          const li = document.createElement("li");
          li.innerText = `${item.category} - ${item.content}`;
          list.appendChild(li);
        });
      }

      // load sẵn khi mở trang
      loadData();
    </script>
    console.log("sending request...");
  </body>
</html>
