<!DOCTYPE html>
<head>
    <button class ="student" onclick="location.href='student.html'">학생</button>
    <button class ="professor" onclick="location.href='teacher.html'">교수</button>
</head>
<body>
    <title></title>
    <form>
        <div class="input">
            <label for="input" class="form-label">피드백을 입력해주세요</label>
        </div>
        <textarea type="text" id="content" name="content" rows="4" cols="50">
    </textarea>
        <button type="submit" id="submit">제출</button>
    </form>
    <style>
          * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
          body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            background-color: #f9f9f9;
        }
        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-buttons button {
            padding: 8px 20px;
            cursor: pointer;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }

        .input {
            width: 100%;
            text-align: center;
        }

        textarea {
            width: 100%;
            resize: vertical;
            padding: 10px;
            font-size: 14px;
        }

        #submit {
            padding: 8px 24px;
            cursor: pointer;
        }
        .window-list {
            list-style-type: none;
            width: 300px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            background: #fff;
        }

        .window-list li {
            border-bottom: 1px solid #eee;
        }

        .window-list li a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
        }
        .window-list li a:hover {
            background-color: #f0f0f0;
        }
        .like-button {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 16px;
        }
        .board-container {
    max-width: 900px;
    margin: 50px auto;
    padding: 0 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead th {
    background-color: #f9f9f9;
    color: #666;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 10px;
    border-bottom: 1px solid #ddd;
}

tbody td {
    padding: 15px 10px;
    border-bottom: 1px solid #eee; 
    font-size: 14px;
    color: #444;
}

tbody tr:hover {
    background-color: #fcfcfc;
}

.title-col {
    text-align: left;
    padding-left: 20px;
}

.view-col {
    text-align: center;
    color: #888;
    width: 80px;
}

.date-col {
    text-align: center;
    color: #888;
    width: 120px;
}

.comment-count {
    color: #e65d5d;
    font-size: 13px;
    margin-left: 4px;
}
    </style>

      <div class="board-container">
    <table>
      <thead>
        <tr>
          <th class="title-col">글 제목</th>
          <th class="view-col">조회수</th>
          <th class="date-col">작성일</th>
        </tr>
      </thead>
      
      <tbody>
        <tr>
          <td class="title-col">류지원 <span class="comment-count"></span></td>
          <td class="view-col">36</td>
          <td class="date-col">2026. 5. 6.</td>
        </tr>
        <tr>
          <td class="title-col">류지원</td>
          <td class="view-col">10</td>
          <td class="date-col">2026. 5. 5.</td>
        </tr>
        </tbody>
    </table>
  </div>
    <button class="like-button" onclick="toggleLike()">
        <span class="heart">❤️</span> <span class="like-text">공감</span>
        <span class="like-count" id="likeCount">0</span>
    </button>
</body>
